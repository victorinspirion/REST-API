<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./login.css" type="text/css">
    <script type="module" src="./login.js"></script>
    <link rel="icon" href="">
</head>
<body>
    <div class="container">
        <div class="login">
            <h2>Entrar</h2>

            <input placeholder="Email" type="email" autocomplete="email" id="email" class="select">
            <input placeholder="Senha" type="password" id="password" class="select">
            <button type="button" id="loginButton" class="select">Login</button>

            <a href="http://localhost:3000/sign-up">Não possui uma conta?</a>

            <div id="returnLogin"></div>
        </div>
    </div>
</body>
</html>
