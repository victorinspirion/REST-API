<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="sign-up.css" type="text/css">
</head>
<body>
    <div class="container">
        <div class="login">
            <h2>Criar conta</h2>

            <input type="text" id="nome" class="select" placeholder="Nome">
            <input type="email" id="email" class="select" placeholder="Email">
            <input type="date" id="idade" class="select">
            <input type="password" id="senha" class="select" placeholder="Senha">

            <button id="buttonSignUp" class="select">Cadastrar</button>

            <a href="http://localhost:3000/login">Já possui uma conta?</a>

            <div id="returnSignup"></div>
        </div>
    </div>
    <script type="module" src= "./sign-up.js"></script>
</body>
</html>
